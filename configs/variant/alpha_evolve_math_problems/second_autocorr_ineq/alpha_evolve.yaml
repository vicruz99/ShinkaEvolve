defaults:
  - override /database@_global_: island_large
  - override /evolution@_global_: large_budget
  - override /task@_global_: "alpha_evolve_math_problems/second_autocorr_ineq"
  - override /cluster@_global_: local
  - _self_

# Override specific parameters

variant_suffix: _alpha_evolve_w_evaluator_large

job_config:
  python_path: examples/alpha_evolve_math_problems/.venv/bin/python
  time: "00:16:00"  # Max time for the entire job (HH:MM:SS)


# Enable async runner for this variant
async_runner: true
max_evaluation_jobs: 15     
max_proposal_jobs: 20


evo_config:
  init_program_path: "examples/alpha_evolve_math_problems/second_autocorr_ineq/initial_alpha_evolve_w_evaluator.py"
  llm_models: [local/openai/gpt-oss-120b@http://localhost:8000/v1]                                            #["local-openai/gpt-oss-120b-http://127.0.0.1:8000/v1"]
  meta_llm_models: [local/openai/gpt-oss-120b@http://localhost:8000/v1]                                       #["local-openai/gpt-oss-120b-http://127.0.0.1:8000/v1"]
  embedding_model: "local-nomic-embed-text:v1.5-http://localhost:11434/v1"
  num_generations: 500
  task_sys_msg: |
      Act as an expert software developer and inequality specialist specializing in creating step functions with certain properties.

      Your task is to generate the sequence of non-negative heights of a step functions, that maximize the following evaluation function:

      def evaluate_sequence(heights_sequence):
        convolution_2 = np.convolve(heights_sequence, heights_sequence)
        num_points = len(convolution_2)
        x_points = np.linspace(-0.5, 0.5, num_points + 2)
        x_intervals = np.diff(x_points) # Width of each interval
        y_points = np.concatenate(([0], convolution_2, [0]))
        l2_norm_squared = 0.0
        for i in range(len(convolution_2) + 1):  # Iterate through intervals
          y1 = y_points[i]
          y2 = y_points[i+1]
          h = x_intervals[i]
          # Integral of (mx + c)^2 = h/3 * (y1^2 + y1*y2 + y2^2) where m = (y2-y1)/h, c = y1 - m*x1, interval is [x1, x2], y1 = mx1+c, y2=mx2+c
          interval_l2_squared = (h / 3) * (y1**2 + y1 * y2 + y2**2)
          l2_norm_squared += interval_l2_squared

        # Calculate the 1-norm: ||f*f||_1
        norm_1 = np.sum(np.abs(convolution_2)) / (len(convolution_2) + 1)

        # Calculate the infinity-norm: ||f*f||_inf
        norm_inf = np.max(np.abs(convolution_2))
        C_lower_bound = l2_norm_squared / (norm_1 * norm_inf)
        print(f"This step function shows that C2 >= {C_lower_bound}")

      Your task is to write a search function that searches for the best sequence of coefficients/heights. Your function will have 1000 seconds to run, and after that it
      has to have returned the best sequence it found. If after 1000 seconds it has not returned anything, it will be terminated with negative infinity points. All
      numbers in your sequence have to be positive or zero.

      You may code up any search method you want, and you are allowed to call the evaluate_sequence() function as many times as you want. You have access to it, you don't need to code up the evaluate_sequence() function.

      You may want to start your search from the best construction we have found so far, which you can access through the 'get_best_sequence_prev()' function.
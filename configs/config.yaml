defaults:
  - _self_
  - database@_global_: island_small
  - evolution@_global_: small_budget
  - task@_global_: circle_packing
  - cluster@_global_: local
  - variant@_global_: circle_packing_example

verbose: false
results_dir: results
run_name: ${now:%Y.%m.%d}${now:%H%M%S}

output_dir: ${results_dir}/${exp_name}/${run_name}${variant_suffix}

# ---- NEW: async runner options ----
async_runner: false           # set to true to use AsyncEvolutionRunner
max_evaluation_jobs: null     # null → defaults to evo_config.max_parallel_jobs
max_proposal_jobs: 10         # max concurrent LLM proposal generation

hydra:
  run:
    dir: ${output_dir}
